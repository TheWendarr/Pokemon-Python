name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" Pillow

      - name: pytest
        run: pytest --tb=short -q

  lint:
    name: Lint examples
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e "."

      - name: Lint all examples
        run: |
          for dir in examples/triad examples/isleton examples/kanto examples/eventlab examples/seamless; do
            echo "=== $dir ===" && pkmn-lint --game "$dir"
          done

  audit:
    name: Data audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e "."

      - name: Audit
        run: pkmn-audit

  coverage:
    name: Move coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e "."

      - name: Coverage (0 skipped required)
        run: pkmn-coverage --battles 200

  wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [test, lint, audit, coverage]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Smoke test wheel
        run: |
          pip install dist/*.whl --force-reinstall
          pkmn-play --help
          pkmn-lint --help
          pkmn-audit --help
          pkmn-coverage --help

      - name: Check no __pycache__ in wheel
        run: |
          python -c "
          import zipfile, sys, glob
          wheels = glob.glob('dist/*.whl')
          for whl in wheels:
              with zipfile.ZipFile(whl) as z:
                  bad = [n for n in z.namelist() if '__pycache__' in n or n.endswith('.pyc')]
                  if bad:
                      print('FAIL: found cached files in wheel:', bad[:5])
                      sys.exit(1)
          print('OK: no __pycache__ or .pyc in wheel')
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
